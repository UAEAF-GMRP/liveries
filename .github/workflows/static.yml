# .github/workflows/deploy-pages.yml

name: Deploy static livery page

on:
  push:
    branches: ["main"]
    paths:
      - "livery-validate.html"   # only trigger when this file changes
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v5

      - name: Verify livery-validate.html exists
        run: |
          if [ ! -f "./livery-validate.html" ]; then
            echo "ERROR: livery-validate.html not found in repo root"
            exit 1
          fi

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
